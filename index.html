<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Atendimento Real-Time</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Fluxo da Loja</h1>
        <div id="data-atual">--/--/----</div>

        <div class="grid-categorias">
            <button onclick="registrar('Venda')" class="btn-venda">💰 Venda</button>
            <button onclick="registrar('Informações')" class="btn-info">ℹ️ Info</button>
            <button onclick="registrar('Pós-Venda')" class="btn-pos">🛠️ Pós</button>
            <button onclick="registrar('Ficha Negada')" class="btn-negada">❌ Negada</button>
        </div>

        <div id="resumo-dia">
            <h3>Carregando dados em tempo real...</h3>
            <div id="lista-contagem"></div>
        </div>

        <button onclick="exportarCSV()" class="btn-relatorio">📊 Baixar Relatório (CSV)</button>
    </div>

    <script type="module">
    // Usando a versão 10.7.1 que é altamente estável para CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDn47rkGxCNJYRq3S76O4vFVbuGL0oTl7M",
        authDomain: "movimento-loja.firebaseapp.com",
        projectId: "movimento-loja",
        storageBucket: "movimento-loja.firebasestorage.app",
        messagingSenderId: "602812276095",
        appId: "1:602812276095:web:66d2aa6436b0f17b620e4a"
    };

    // Inicialização protegida
    let db;
    let colRef;

    try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        colRef = collection(db, "atendimentos");
        console.log("Firebase conectado com sucesso!");
    } catch (error) {
        console.error("Erro ao inicializar Firebase:", error);
    }

    // ANEXAR AO WINDOW (Para o HTML encontrar as funções)
    window.registrar = async (categoria) => {
        if (!colRef) return alert("Erro: Banco de dados não carregado.");
        
        const agora = new Date();
        try {
            await addDoc(colRef, {
                categoria: categoria,
                timestamp: agora,
                dataString: agora.toLocaleDateString('pt-BR'),
                diaSemana: agora.toLocaleDateString('pt-BR', { weekday: 'long' }),
                hora: agora.toLocaleTimeString('pt-BR')
            });
        } catch (e) {
            console.error("Erro no registro:", e);
        }
    };

    window.exportarCSV = () => {
        if (!window.dadosParaExportar || window.dadosParaExportar.length === 0) {
            alert("Não há dados para exportar.");
            return;
        }
        let csv = "Data;Hora;Dia;Categoria\n";
        window.dadosParaExportar.forEach(d => {
            csv += `${d.dataString};${d.hora};${d.diaSemana};${d.categoria}\n`;
        });
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `relatorio_${new Date().toLocaleDateString('pt-BR')}.csv`;
        link.click();
    };

    // ESCUTAR EM TEMPO REAL (Se colRef existir)
    if (colRef) {
        onSnapshot(query(colRef, orderBy("timestamp", "desc")), (snapshot) => {
            let atendimentos = [];
            snapshot.docs.forEach(doc => atendimentos.push(doc.data()));
            atualizarTela(atendimentos);
            window.dadosParaExportar = atendimentos; 
        });
    }

    function atualizarTela(dados) {
        const hoje = new Date().toLocaleDateString('pt-BR');
        document.getElementById('data-atual').innerText = hoje;

        const dadosHoje = dados.filter(d => d.dataString === hoje);
        const contagem = dadosHoje.reduce((acc, curr) => {
            acc[curr.categoria] = (acc[curr.categoria] || 0) + 1;
            return acc;
        }, {});

        let html = `<strong>Total Hoje: ${dadosHoje.length}</strong><br><br>`;
        const categoriasPadrao = ["Venda", "Informações", "Pós-Venda", "Ficha Negada"];
        
        categoriasPadrao.forEach(cat => {
            const qtd = contagem[cat] || 0;
            html += `<div style="margin-bottom: 5px;">${cat}: <strong>${qtd}</strong></div>`;
        });
        
        document.getElementById('lista-contagem').innerHTML = html;
    }
</script>
</body>
</html>
